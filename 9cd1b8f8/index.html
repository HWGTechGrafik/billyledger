/* Farbwelt HWG.Tech (schwarz/weiß/grün, abgestimmt mit ApiControl).
   --akzent ist die Kundenfarbe und wird zur Laufzeit gesetzt. Weil ein satter
   Grünton als Textfarbe bzw. hinter weißer Schrift zu kontrastarm wäre
   (#18aa4c auf Weiß ergibt nur ~3:1), werden davon zwei abgedunkelte
   Varianten abgeleitet: --akzent-text für farbigen Text auf hellem Grund und
   --akzent-fest für gefüllte Flächen mit weißer Schrift. Die Ableitung per
   color-mix wirkt für JEDE Kundenfarbe, nicht nur für das Werksgrün. */
:root {
  --akzent: #18aa4c;
  --akzent-text: color-mix(in srgb, var(--akzent), #000000 22%);
  --akzent-fest: color-mix(in srgb, var(--akzent), #000000 22%);
  --bg: #f5f1ea;
  --flaeche: #fff;
  --flaeche-2: #faf8f5;
  --flaeche-3: #e8e5e0;
  --input-bg: #fff;
  --text: #1d1d1d;
  --text-2: #555;
  --grau: #777;
  --grau-2: #888;
  --rand: #ccc;
  --rand-2: #e5e0d8;
  --rand-3: #eee;
  --rand-4: #ddd;
  --btn-bg: #fff;
  --btn-rand: #bbb;
  --btn-text: #333;
  --btn-hover: #f3f0ea;
  --schatten: rgba(0,0,0,.08);
  color-scheme: light;
}
/* Dunkelmodus: nur die App-Oberfläche wird dunkel – das Beleg-Blatt bleibt bewusst
   weiß (Bildschirm = Druck = PDF). Die Neutraltöne sind kühl-neutral wie in
   ApiControl (vorher braunstichig, was neben Grün schmutzig wirkte). --akzent
   bleibt die Kundenfarbe; für Text auf dunklem Grund wird sie aufgehellt. */
:root[data-theme="dark"] {
  --akzent-text: color-mix(in srgb, var(--akzent), #ffffff 42%);
  --bg: #15171a;
  --flaeche: #1e2126;
  --flaeche-2: #1a1d21;
  --flaeche-3: #24282e;
  --input-bg: #1a1d21;
  --text: #e6e6e6;
  --text-2: #c3c7cc;
  --grau: #9aa0a6;
  --grau-2: #8b9198;
  --rand: #464c54;
  --rand-2: #3a3f46;
  --rand-3: #33383f;
  --rand-4: #4a515a;
  --btn-bg: #2a2e34;
  --btn-rand: #4a515a;
  --btn-text: #e6e6e6;
  --btn-hover: #343a41;
  --schatten: rgba(0,0,0,.5);
  color-scheme: dark;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { font-family: Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
.app { min-height: 100vh; padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
.kopf { background: var(--flaeche); border-bottom: 3px solid var(--akzent); padding: 12px 18px 0; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px; }
.kopf-titel { display: flex; gap: 10px; align-items: center; padding-bottom: 10px; }
.hwg-marke { font-size: 11px; font-weight: normal; opacity: .72; letter-spacing: .03em; white-space: nowrap; }
.kopf-logo { height: 36px; }
.app-name { font-weight: bold; font-size: 18px; color: var(--akzent-text); }
.app-firma { font-size: 12px; color: var(--grau); }
.tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.tab { border: none; background: transparent; padding: 10px 14px; font-size: 14px; cursor: pointer; border-radius: 8px 8px 0 0; color: var(--text-2); font-family: inherit; }
.tab.aktiv { background: var(--akzent-fest); color: #fff; font-weight: bold; }
.inhalt { max-width: 1500px; margin: 0 auto; padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
.karte { background: var(--flaeche); border-radius: 10px; padding: 16px 18px; margin-bottom: 16px; box-shadow: 0 1px 4px var(--schatten); }
.unterkarte { background: var(--flaeche-2); border: 1px solid var(--rand-2); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
h2 { margin: 0 0 12px; font-size: 17px; color: var(--akzent-text); }
h3 { margin: 16px 0 8px; font-size: 14px; color: var(--akzent-text); }
.zeile-oben { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
.felder-zeile { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-end; }
.felder-zeile.umbruch { flex-wrap: wrap; }
.feld { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--grau); flex: 1; min-width: 140px; position: relative; }
.feld-klein { max-width: 130px; min-width: 90px; }
.feld-breit { flex: 2; }
.feld input, .feld textarea, select { font-family: inherit; font-size: 14px; padding: 7px 9px; border: 1px solid var(--rand); border-radius: 6px; color: var(--text); background: var(--input-bg); }
.feld input:focus, .feld textarea:focus { outline: 2px solid var(--akzent); border-color: var(--akzent); }
.btn { font-family: inherit; font-size: 13px; padding: 8px 13px; border-radius: 7px; border: 1px solid var(--btn-rand); background: var(--btn-bg); cursor: pointer; color: var(--btn-text); }
.btn:hover { background: var(--btn-hover); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-akzent { background: var(--akzent-fest); border-color: var(--akzent-fest); color: #fff; font-weight: bold; }
.btn-akzent:hover { filter: brightness(1.08); background: var(--akzent-fest); }
.btn-warn { background: #c8571f; border-color: #c8571f; color: #fff; }
.btn-mini { padding: 4px 8px; font-size: 12px; }
.btn-x { padding: 4px 8px; font-size: 12px; color: #a33; border-color: #d9c1c1; }
.btn-unten { align-self: flex-end; }
.aktionen { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 10px; }
.meldung { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 300; padding: 10px 18px; border-radius: 8px; font-size: 14px; box-shadow: 0 3px 10px rgba(0,0,0,.25); max-width: 90vw; }
.meldung-ok { background: #2c6e3f; color: #fff; }
.meldung-fehler { background: #a83232; color: #fff; }
.hinweis { padding: 10px 12px; border-radius: 8px; font-size: 13px; margin: 8px 0; }
.hinweis-info { background: #eef3f8; border: 1px solid #c4d6e6; color: #2b4a63; }
.bestaetigung { background: #fff4e5; border: 2px solid #e8963f; border-radius: 8px; padding: 12px; margin: 10px 0; }
:root[data-theme="dark"] .bestaetigung { background: #3a2e1c; border-color: #9c7433; }
:root[data-theme="dark"] .hinweis-info { background: #1f2b36; border-color: #35516b; color: #bcd6ec; }
.bestaetigung-text { font-size: 14px; margin-bottom: 10px; }
.bestaetigung-knoepfe { display: flex; gap: 8px; }
.grau { color: var(--grau-2); }
.klein { font-size: 12px; }
.fett { font-weight: bold; }
.mt6 { margin-top: 6px; }
.re { text-align: right; }
.li { text-align: left; }
.vorformatiert { white-space: pre-line; }
.werkzeugleiste { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
.suche { font-family: inherit; font-size: 14px; padding: 8px 10px; border: 1px solid var(--rand); border-radius: 7px; min-width: 220px; background: var(--input-bg); color: var(--text); }
.kennzahlen { display: flex; gap: 14px; flex-wrap: wrap; }
.kennzahlen-gross { margin-top: 4px; }
.kennzahl { background: var(--flaeche-2); border: 1px solid var(--rand-2); border-radius: 8px; padding: 8px 14px; display: flex; flex-direction: column; gap: 2px; }
.kennzahl span { font-size: 11px; color: var(--grau); }
.kennzahl strong { font-size: 15px; color: var(--akzent-text); }
.tabellen-rahmen { overflow-x: auto; }
.daten-tabelle { width: 100%; border-collapse: collapse; font-size: 13px; }
.daten-tabelle th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--grau); padding: 6px 8px; border-bottom: 2px solid var(--akzent); }
.daten-tabelle th.re { text-align: right; }
.daten-tabelle td { padding: 5px 8px; border-bottom: 1px solid var(--rand-3); vertical-align: middle; }
.daten-tabelle input { width: 100%; font-family: inherit; font-size: 13px; padding: 5px 7px; border: 1px solid var(--rand-4); border-radius: 5px; background: var(--input-bg); color: var(--text); }
.daten-tabelle td.sm input[type=number] { max-width: 100px; }
.zeile-warnung td { background: #fdeaea; }
.zeile-offen td { background: #fdf6d8; }
.zeile-bezahlt td { background: #e3efe6; }
:root[data-theme="dark"] .zeile-warnung td { background: #45282a; }
:root[data-theme="dark"] .zeile-offen td { background: #46411e; }
:root[data-theme="dark"] .zeile-bezahlt td { background: #243f2b; }
.zeile-storno td { color: #999; text-decoration: line-through; }
.zeile-storno td:last-child { text-decoration: none; }
.bestand-zelle { white-space: nowrap; min-width: 150px; }
.bestand-zelle input { max-width: 70px; text-align: right; margin: 0 3px; }
/* Bestand-Zahlenfeld schmal halten (schlägt die generische td.sm-Kappung 100px), damit − Feld + in die Zelle passen und das + nicht überläuft/verdeckt wird */
.daten-tabelle td.sm.bestand-zelle input[type=number] { max-width: 64px; }
.badge { font-size: 11px; font-weight: bold; padding: 3px 8px; border-radius: 10px; }
.badge-rechnung { background: #e3efe6; color: #2c6e3f; }
.badge-angebot { background: #e8eef7; color: #2b4a8f; }
.aktionen-zelle { white-space: nowrap; display: flex; gap: 4px; }
.daten-tabelle th.mi, .daten-tabelle td.mi { text-align: center; }
.schalter-mini { font-size: 12px; gap: 4px; justify-content: center; white-space: nowrap; }
.schalter-mini input[type=checkbox] { width: auto; }
.kunden-raster { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.kunden-karte { border: 1px solid var(--rand-2); border-radius: 8px; padding: 12px; background: var(--flaeche-2); display: flex; flex-direction: column; gap: 4px; }
.ueberlagerung { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; display: flex; align-items: flex-start; justify-content: center; overflow: auto; padding: 20px; }
.ueberlagerung-inhalt { background: var(--flaeche-3); border-radius: 10px; padding: 14px; max-width: 860px; width: 100%; }
.ueberlagerung-leiste { margin: 0 0 10px; justify-content: flex-end; }
.versionszeile { text-align: center; color: var(--grau-2); font-size: 12px; padding: 8px; cursor: default; user-select: none; }
.karte-admin { border: 2px solid var(--akzent); }
.einstellungen select { padding: 7px 9px; }
.logo-vorschau { height: 34px; border: 1px solid var(--rand-4); border-radius: 5px; background: #fff; padding: 2px; }

/* Rechnung/Angebot-Editor */
/* Editor hat Vorrang (feste Wunschbreite), die Vorschau nimmt den Rest und skaliert */
.beleg-tab { display: grid; grid-template-columns: minmax(680px, 850px) minmax(380px, 780px); gap: 16px; align-items: start; }
@media (max-width: 1150px) { .beleg-tab { grid-template-columns: 1fr; } }
/* Grid-Kinder dürfen schmaler werden als ihr Inhalt – sonst läuft die Karte am Handy über */
.beleg-editor, .beleg-vorschau-spalte { min-width: 0; max-width: 100%; }
.mobil-umschalter { justify-self: center; margin-bottom: 2px; }
.vorschau-skalierer { width: 100%; }
.sync-bereich { max-width: 1360px; margin: 0 auto; padding: 12px 16px 0; }
.sync-bereich .bestaetigung, .sync-bereich .hinweis { margin: 0; }
.sync-hinweis { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.umschalter { display: inline-flex; border: 1px solid var(--akzent); border-radius: 8px; overflow: hidden; }
.umschalt-btn { border: none; background: var(--flaeche); padding: 8px 18px; font-size: 14px; cursor: pointer; font-family: inherit; color: var(--akzent-text); }
.umschalt-btn.aktiv { background: var(--akzent-fest); color: #fff; font-weight: bold; }
.umschalt-btn:disabled { opacity: .55; cursor: not-allowed; }
.beleg-nr { font-size: 18px; font-weight: bold; color: var(--akzent-text); }
.kunde-feld textarea { resize: vertical; }
.vorschlaege { position: absolute; top: 100%; left: 0; right: 0; background: var(--flaeche); border: 1px solid var(--rand); border-radius: 0 0 8px 8px; z-index: 50; box-shadow: 0 5px 12px rgba(0,0,0,.15); }
.vorschlag { display: block; width: 100%; text-align: left; border: none; background: var(--flaeche); padding: 8px 10px; font-size: 13px; cursor: pointer; font-family: inherit; border-bottom: 1px solid var(--rand-3); color: var(--text); }
.vorschlag:hover { background: var(--btn-hover); }
.vorschlag-zeile td { padding: 2px 5px 8px; }
.vorschlaege-inline { border: 1px solid var(--rand); border-radius: 8px; overflow-x: hidden; overflow-y: auto; max-height: 300px; box-shadow: 0 4px 10px rgba(0,0,0,.10); max-width: 560px; }
.vorschlaege-inline .vorschlag:last-child { border-bottom: none; }
.schalter-zeile { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; margin: 10px 0; }
.schalter { display: flex; gap: 6px; align-items: center; font-size: 14px; cursor: pointer; }
.editor-tabelle { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 8px; }
.editor-tabelle th { text-align: left; font-size: 12px; color: var(--grau); padding: 5px 5px; border-bottom: 2px solid var(--akzent); }
.editor-tabelle th.re { text-align: right; }
.editor-tabelle th.sm { width: 86px; }
.editor-tabelle th.md { width: 118px; }
.editor-tabelle th.xs { width: 38px; }
.editor-tabelle th:first-child { min-width: 250px; }
.editor-tabelle td { padding: 4px 5px; border-bottom: 1px solid var(--rand-3); }
.editor-tabelle input { width: 100%; font-family: inherit; font-size: 15px; padding: 8px 8px; border: 1px solid var(--rand-4); border-radius: 5px; background: var(--input-bg); color: var(--text); }
.zelle-gesamt { white-space: nowrap; font-weight: bold; }
.ohne-lager { color: #999; text-align: center; font-style: italic; white-space: nowrap; }
.daten-tabelle select { width: 100%; font-family: inherit; font-size: 13px; padding: 6px 4px; border: 1px solid var(--rand-4); border-radius: 5px; background: var(--input-bg); color: var(--text); }
/* Art-Spalte (Ware/Leistung) breit genug, dass die Auswahl lesbar bleibt */
.lager-tabelle select { min-width: 96px; }
/* Bezeichnung-Spalte breit genug für lange Artikelnamen */
.lager-tabelle th:first-child { min-width: 280px; }
/* Einheit-Spalte breit genug für z. B. "Pauschale" (auch bei 16px Handy-Schrift) */
.lager-tabelle th.th-einheit { min-width: 120px; }
.warn-zeile td { padding: 2px 4px 8px; font-size: 12px; border-bottom: 1px solid var(--rand-3); }
.warnung { font-weight: bold; padding: 2px 8px; border-radius: 6px; }
.warnung-rot { background: #fbe1e1; color: #a11f1f; }
.warnung-gelb { background: #fcf3d7; color: #8a6d05; }
.summen-kasten { margin: 10px 0 4px auto; max-width: 360px; font-size: 15px; }
.summen-kasten > div { display: flex; justify-content: space-between; padding: 3px 0; }
.summe-gesamt { border-top: 2px solid var(--akzent); font-weight: bold; font-size: 16px; color: var(--akzent-text); margin-top: 4px; padding-top: 6px; }

/* Beleg-Vorschau (Bildschirm = Druck = PDF), Schrift Helvetica/Arial */
.vorschau-titel { font-size: 12px; color: var(--grau-2); margin-bottom: 6px; }
.beleg-blatt { background: #fff; width: 100%; max-width: 820px; aspect-ratio: 210/297; min-height: 620px; padding: 5.2% 7.3%; box-shadow: 0 2px 10px rgba(0,0,0,.18); font-family: Helvetica, Arial, sans-serif; font-size: 12.5px; color: #141414; display: flex; flex-direction: column; overflow: hidden; }
.beleg-kopf { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 26px; }
.beleg-titel { font-size: 34px; font-weight: bold; letter-spacing: .5px; }
.beleg-firma-bereich { display: flex; gap: 12px; align-items: center; }
.beleg-logo { max-height: 68px; max-width: 130px; }
.beleg-firma { text-align: right; }
.beleg-firma-name { font-weight: bold; font-size: 14.5px; margin-bottom: 3px; }
.beleg-firma-zeile { font-size: 11.5px; color: #6e6e6e; line-height: 1.45; }
.beleg-adresse-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 26px; }
.beleg-empfaenger { font-size: 13px; line-height: 1.5; }
.beleg-bauvorhaben { font-size: 13px; line-height: 1.5; margin: -14px 0 22px; }
.beleg-meta { border-collapse: collapse; }
.beleg-meta .meta-label { color: #6e6e6e; font-size: 12px; padding: 1px 14px 1px 0; text-align: right; }
.beleg-meta .meta-wert { font-weight: bold; font-size: 12.5px; text-align: right; padding: 1px 0; }
.beleg-tabelle { width: 100%; border-collapse: collapse; font-size: 12px; }
.beleg-tabelle thead tr { border-bottom: 2px solid; }
.beleg-tabelle th { font-size: 11px; padding: 3px 4px 5px; }
.beleg-tabelle td { padding: 5px 4px; border-bottom: 1px solid #e2e2e2; vertical-align: top; }
.beleg-summen { display: flex; justify-content: flex-end; margin-top: 12px; }
.beleg-summen table { border-collapse: collapse; font-size: 12.5px; }
.beleg-summen .s-label { text-align: right; padding: 2.5px 22px 2.5px 0; color: #333; }
.beleg-summen .s-wert { text-align: right; padding: 2.5px 0; min-width: 90px; }
.beleg-summen .s-gesamt td { border-top: 2px solid; padding-top: 6px; font-size: 14.5px; }
.beleg-mwst-hinweis { text-align: left; margin-top: 10px; font-size: 11px; font-style: italic; color: #6e6e6e; }
/* Fußblock: EIN Block aus Zahlungsbedingungen, Bankverbindung und Freitext.
   Standard „unten" schiebt ihn per margin-top:auto an den Blattfuß; mit
   .fuss-an-summe folgt er stattdessen direkt der Endsumme. Der QR-Code sitzt
   in beiden Fällen rechts daneben und wandert automatisch mit. */
.beleg-fuss { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-top: auto; padding-top: 26px; font-size: 11px; line-height: 1.5; }
.beleg-fuss.fuss-an-summe { margin-top: 0; padding-top: 14px; }
.beleg-fuss-block { max-width: 62%; }
.beleg-fuss.fuss-zentriert .beleg-fuss-block { text-align: center; }
.fuss-freitext { white-space: pre-wrap; margin-top: 6px; }
.beleg-qr { text-align: center; }
.beleg-qr img { width: 96px; height: 96px; }
.qr-text { font-size: 9.5px; color: #6e6e6e; margin-top: 2px; line-height: 1.35; }
.beleg-fusszeile { text-align: center; margin-top: 14px; }
/* Steht der Fußblock oben an der Summe, hält diese Zeile den Blattfuß */
.beleg-fuss.fuss-an-summe + .beleg-fusszeile { margin-top: auto; padding-top: 26px; }
.fuss-klein { font-size: 10px; color: #6e6e6e; }

/* Responsive: Tablet (bis 1100px) */
@media (max-width: 1100px) {
  .inhalt { padding: 12px; }
  .kopf { padding: 10px 12px 0; }
}
/* Responsive: Handy (bis 700px) */
@media (max-width: 700px) {
  .kopf { padding: 8px 8px 0; }
  .kopf-titel { padding-bottom: 6px; }
  .kopf-logo { height: 28px; }
  .app-name { font-size: 15px; }
  .tabs { flex-wrap: nowrap; overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; }
  .tab { padding: 9px 11px; font-size: 13px; white-space: nowrap; flex: 0 0 auto; }
  .inhalt { padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
  .sync-bereich { padding: 8px 8px 0; }
  .karte { padding: 12px 10px; border-radius: 8px; }
  .felder-zeile { flex-wrap: wrap; }
  .feld { min-width: 120px; }
  /* 16px verhindert das automatische Heranzoomen beim Antippen von Feldern */
  .feld input, .feld textarea, select, .suche, .editor-tabelle input, .daten-tabelle input { font-size: 16px; }
  .btn { padding: 10px 14px; }
  .btn-mini { padding: 8px 10px; }
  .btn-x { padding: 8px 10px; }
  .zeile-oben { align-items: stretch; }
  .beleg-nr { font-size: 16px; align-self: center; }
  .summen-kasten { max-width: none; }
  .kennzahlen { gap: 8px; }
  .werkzeugleiste .suche { min-width: 0; flex: 1; }
  .editor-tabelle { min-width: 720px; }
  .daten-tabelle { min-width: 640px; }
  /* Artikel/Leistung: 10 Spalten – Zahlenfelder (Bestand/Mindestbestand) am Handy lesbar halten */
  .lager-tabelle { min-width: 900px; }
  .lager-tabelle td.sm input[type=number] { min-width: 56px; }
  .lager-tabelle select { min-width: 112px; }
  .lager-tabelle .bestand-zelle input { max-width: 64px; min-width: 56px; }
  .ueberlagerung { padding: 8px; }
}

/* Druck: nur der Druckbereich */
#druckbereich { display: none; }
@media print {
  body { background: #fff; }
  .app > .kopf, .app > .inhalt, .app > .meldung { display: none !important; }
  #druckbereich { display: block !important; }
  #druckbereich .beleg-blatt { box-shadow: none; max-width: none; width: 100%; aspect-ratio: auto; min-height: 96vh; padding: 10mm 14mm; }
}
`,wurzel=ReactDOM.createRoot(document.getElementById("root"));wurzel.render(React.createElement(App,null));
